<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#006BB6">
    <title>Orientation Bag Tracker</title>
    <link rel="manifest" href="../manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .app-container {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 3px solid #006BB6;
        }

        .logo-container {
            max-width: 130px;
        }

        .logo-container img {
            max-width: 100%;
            height: auto;
        }

        .back-button {
            display: inline-block;
            color: #006BB6;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .back-button:hover {
            text-decoration: underline;
        }

        h1 {
            color: #006BB6;
            margin-bottom: 4px;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            margin-bottom: 14px;
            font-size: 1rem;
        }

        /* Settings panel */
        .settings-panel {
            margin-bottom: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
        }

        .settings-panel summary {
            padding: 10px 16px;
            background: #f9f9f9;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.88rem;
            color: #555;
            user-select: none;
            list-style: none;
        }

        .settings-panel summary::-webkit-details-marker { display: none; }

        .settings-panel[open] summary {
            border-bottom: 1px solid #e0e0e0;
        }

        .settings-inner {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .settings-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .settings-row .sfield {
            flex: 1;
            min-width: 120px;
        }

        .settings-row label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            font-size: 0.88rem;
        }

        .settings-row input {
            width: 100%;
            padding: 9px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .settings-row input:focus {
            outline: none;
            border-color: #006BB6;
        }

        .config-summary {
            font-size: 0.83rem;
            color: #555;
            padding: 6px 10px;
            background: #f0f7fc;
            border-radius: 4px;
        }

        /* Main controls */
        .controls {
            display: grid;
            grid-template-columns: minmax(180px, 260px) auto auto;
            gap: 10px;
            margin-bottom: 12px;
            padding: 12px;
            align-items: end;
            background: #f0f7fc;
            border: 1px solid #d5e8f5;
            border-radius: 6px;
        }

        .form-group {
            min-width: 0;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 0.95rem;
        }

        input[type="number"] {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            width: 100%;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #006BB6;
        }

        button {
            background: #006BB6;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #005a94;
        }

        button:active {
            transform: scale(0.98);
        }

        button.reset {
            background: #D22630;
        }

        button.reset:hover {
            background: #b81e28;
        }

        .legend {
            display: flex;
            gap: 14px;
            margin-bottom: 14px;
            padding: 8px 12px;
            background: #f9f9f9;
            border-radius: 6px;
            border-left: 4px solid #006BB6;
            align-items: center;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .legend-box {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 2px solid #333;
            flex-shrink: 0;
        }

        .legend-box.filled {
            background: #006BB6;
        }

        .legend-box.empty {
            background: white;
        }

        .legend-text {
            font-size: 0.88rem;
            font-weight: 500;
            color: #333;
        }

        .room-label {
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #006BB6;
            padding: 8px;
            background: #f0f7fc;
            border-radius: 6px;
        }

        .seating-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 12px;
            padding: 25px;
            background: #fafafa;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            position: relative;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .seating-area::before,
        .seating-area::after {
            content: '';
            position: sticky;
            top: 0;
            bottom: 0;
            width: 30px;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .seating-area::before {
            left: 0;
            float: left;
            margin-right: -30px;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.15), transparent);
        }

        .seating-area::after {
            right: 0;
            float: right;
            margin-left: -30px;
            background: linear-gradient(to left, rgba(0, 0, 0, 0.15), transparent);
        }

        .seating-area.show-left-shadow::before { opacity: 1; }
        .seating-area.show-right-shadow::after { opacity: 1; }

        .row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .row-label {
            display: flex;
            align-items: center;
            font-weight: 600;
            color: #666;
            min-width: 70px;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .table-group {
            display: flex;
            gap: 8px;
        }

        .table-group + .table-group {
            margin-left: 15px;
        }

        .chair {
            width: 52px;
            height: 52px;
            border: 2px solid #333;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            color: #333;
            flex-shrink: 0;
        }

        .chair.filled {
            background: #006BB6;
            color: white;
            border-color: #005a94;
        }

        .chair:hover {
            transform: scale(1.08);
            box-shadow: 0 3px 10px rgba(0, 107, 182, 0.35);
        }

        .summary {
            margin-top: 25px;
            padding: 15px 20px;
            background: #f0f7fc;
            border-radius: 6px;
            font-size: 1rem;
            border-left: 4px solid #006BB6;
        }

        .summary strong {
            color: #006BB6;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            body { padding: 6px; }
            .app-container { padding: 10px; }
            .header {
                flex-direction: row;
                align-items: center;
                gap: 10px;
                margin-bottom: 10px;
                padding-bottom: 8px;
                border-bottom-width: 2px;
            }
            .logo-container { max-width: 96px; }
            .back-button {
                font-size: 0.78rem;
                white-space: nowrap;
            }
            h1 {
                font-size: 1.22rem;
                line-height: 1.15;
                margin-bottom: 6px;
            }
            .subtitle { display: none; }
            .controls {
                grid-template-columns: minmax(0, 1fr) auto auto;
                gap: 6px;
                margin-bottom: 8px;
                padding: 8px;
                align-items: stretch;
            }
            .controls label {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: 0;
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
                border: 0;
            }
            .form-group { width: auto; }
            input[type="number"] {
                width: 100%;
                height: 38px;
                padding: 8px 10px;
                font-size: 0.95rem;
            }
            button {
                width: auto;
                min-width: 58px;
                height: 38px;
                padding: 0 10px;
                font-size: 0.86rem;
                line-height: 1;
            }
            .settings-panel {
                margin-bottom: 8px;
                border-radius: 5px;
            }
            .settings-panel summary {
                padding: 8px 10px;
                font-size: 0.8rem;
            }
            .settings-inner {
                padding: 10px;
                gap: 8px;
            }
            .settings-row {
                display: grid;
                grid-template-columns: 74px minmax(0, 1fr) auto;
                gap: 6px;
                align-items: end;
            }
            .settings-row .sfield { min-width: 0; }
            .settings-row label {
                margin-bottom: 4px;
                font-size: 0.72rem;
                line-height: 1.15;
            }
            .settings-row input {
                padding: 7px 8px;
                font-size: 0.85rem;
                border-width: 1px;
                height: 36px;
            }
            .settings-row button {
                width: auto;
                min-width: 54px;
                padding: 0 9px;
            }
            .config-summary {
                padding: 5px 8px;
                font-size: 0.74rem;
            }
            .legend {
                gap: 10px;
                margin-bottom: 8px;
                padding: 6px 8px;
                border-left-width: 3px;
            }
            .legend-item { gap: 5px; }
            .legend-box {
                width: 12px;
                height: 12px;
                border-width: 1px;
            }
            .legend-text { font-size: 0.75rem; }
            .legend-tip { display: none; }
            .seating-area {
                margin-top: 8px;
                padding: 8px;
                gap: 10px;
            }
            .row { justify-content: flex-start; }
            .row-label { min-width: 50px; font-size: 0.8rem; }
            .room-label {
                font-size: 0.78rem;
                padding: 5px;
                margin-bottom: 6px;
            }
            .summary {
                font-size: 0.84rem;
                margin-top: 10px;
                padding: 8px 10px;
            }
        }

        @media (max-width: 768px) and (orientation: portrait) {
            .seating-area {
                overflow-x: visible;
                padding: 4px;
            }
            .seating-area::before,
            .seating-area::after {
                display: none;
            }
            .row {
                gap: 3px;
                justify-content: flex-start;
            }
            .row-label {
                min-width: 32px;
                font-size: 0.62rem;
            }
            .chair {
                width: 14px;
                height: 14px;
                border-width: 1px;
                border-radius: 3px;
                font-size: 0;
            }
            .chair:hover {
                transform: none;
                box-shadow: none;
            }
            .table-group { gap: 2px; }
            .table-group + .table-group { margin-left: 4px; }
        }

        @media (max-width: 1024px) and (orientation: landscape) {
            .seating-area { padding: 10px 15px; overflow-x: visible; }
            .row { gap: 3px; justify-content: flex-start; }
            .chair { width: 35px; height: 35px; font-size: 0.7rem; border-width: 1.5px; }
            .table-group { gap: 3px; }
            .table-group + .table-group { margin-left: 6px; }
            .row-label { min-width: 40px; font-size: 0.7rem; }
            .seating-area::before, .seating-area::after { display: none; }
        }

        @media (min-width: 1025px) and (orientation: landscape) {
            .chair { width: 52px; height: 52px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-container">
            <div class="header">
                <div class="logo-container">
                    <img src="../images/ballad-logo.jpg" alt="Ballad Health Logo" id="logo">
                </div>
                <a href="../index.html" class="back-button">← Back to Home</a>
            </div>

            <h1>Orientation Bag Tracker</h1>
            <p class="subtitle">Day One Orientation Seating Management</p>

            <div class="controls">
                <div class="form-group">
                    <label for="numTMs">Number of Team Members:</label>
                    <input type="number" inputmode="numeric" pattern="[0-9]*" id="numTMs" min="1" placeholder="Team members">
                </div>
                <button onclick="placeBags()">Place</button>
                <button class="reset" onclick="resetAll()">Reset</button>
            </div>

            <details class="settings-panel">
                <summary>Configure Room Layout</summary>
                <div class="settings-inner">
                    <div class="settings-row">
                        <div class="sfield">
                            <label for="cfgRows">Rows</label>
                            <input type="number" id="cfgRows" min="1" max="30" value="6">
                        </div>
                        <div class="sfield">
                            <label for="cfgLayout">Chair groups per row</label>
                            <input type="text" id="cfgLayout" placeholder="e.g. 6,6,6">
                        </div>
                        <button onclick="applyConfig()">Apply</button>
                    </div>
                    <p class="config-summary" id="configSummary"></p>
                </div>
            </details>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-box filled"></div>
                    <span class="legend-text">Bag Placed</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box empty"></div>
                    <span class="legend-text">Empty Chair</span>
                </div>
                <div class="legend-item legend-tip">
                    <span class="legend-text"><strong>Tip:</strong> Click any chair to toggle</span>
                </div>
            </div>

            <div class="room-label">FRONT OF ROOM</div>

            <div class="seating-area" id="seatingArea"></div>

            <div class="summary" id="summary" style="display: none;">
                <strong>Bags Placed:</strong> <span id="bagCount">0</span> / <span id="totalCount">0</span> chairs
            </div>
        </div>
    </div>

    <script src="../firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
        document.getElementById('logo').onerror = function() { this.style.display = 'none'; };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const myClientId = Date.now().toString(36) + Math.random().toString(36).substr(2);

        // Layout state - defaults to 6-6-6
        let rows = 6;
        let layout = [6, 6, 6];
        let totalChairs = 108;
        let chairStates = new Array(108).fill(false);
        let fillPriority = [];

        function chairsPerRow() {
            return layout.reduce((a, b) => a + b, 0);
        }

        // Center-out fill priority for any layout
        function generateFillPriority(r, l) {
            const cpr = l.reduce((a, b) => a + b, 0);
            const priority = [];

            for (let row = 0; row < r; row++) {
                const rowStart = row * cpr;
                const lo = Math.floor((cpr - 1) / 2);
                const hi = lo + (cpr % 2 === 0 ? 1 : 0);

                priority.push(rowStart + lo);
                if (lo !== hi) priority.push(rowStart + hi);

                for (let d = 1; lo - d >= 0 || hi + d < cpr; d++) {
                    if (lo - d >= 0) priority.push(rowStart + lo - d);
                    if (hi + d < cpr) priority.push(rowStart + hi + d);
                }
            }

            return priority;
        }

        function saveToFirestore() {
            db.collection('bag-tracker').doc('current').set({
                rows,
                layout,
                chairStates,
                lastClientId: myClientId
            });
        }

        function createSeatingLayout() {
            const seatingArea = document.getElementById('seatingArea');
            seatingArea.innerHTML = '';

            let chairNumber = 0;

            for (let row = 0; row < rows; row++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';

                const rowLabel = document.createElement('div');
                rowLabel.className = 'row-label';
                rowLabel.textContent = `Row ${row + 1}`;
                rowDiv.appendChild(rowLabel);

                layout.forEach(tableSize => {
                    const tableGroup = document.createElement('div');
                    tableGroup.className = 'table-group';

                    for (let seat = 0; seat < tableSize; seat++) {
                        const chair = document.createElement('div');
                        chair.className = 'chair';
                        chair.dataset.chairNum = chairNumber;
                        chair.textContent = chairNumber + 1;

                        chair.addEventListener('click', (function(num) {
                            return function() { toggleChair(num); };
                        })(chairNumber));

                        tableGroup.appendChild(chair);
                        chairNumber++;
                    }

                    rowDiv.appendChild(tableGroup);
                });

                seatingArea.appendChild(rowDiv);
            }

            updateDisplay();
        }

        function toggleChair(chairNum) {
            chairStates[chairNum] = !chairStates[chairNum];
            updateDisplay();
            saveToFirestore();
        }

        function placeBags() {
            const numTMs = parseInt(document.getElementById('numTMs').value);
            if (!numTMs || numTMs < 1 || numTMs > totalChairs) {
                alert(`Please enter a number between 1 and ${totalChairs}`);
                return;
            }

            chairStates = new Array(totalChairs).fill(false);
            for (let i = 0; i < numTMs && i < fillPriority.length; i++) {
                chairStates[fillPriority[i]] = true;
            }

            updateDisplay();
            saveToFirestore();
        }

        function resetAll() {
            chairStates = new Array(totalChairs).fill(false);
            document.getElementById('numTMs').value = '';
            updateDisplay();
            saveToFirestore();
        }

        function updateDisplay() {
            for (let i = 0; i < totalChairs; i++) {
                const chair = document.querySelector(`[data-chair-num="${i}"]`);
                if (chair) {
                    chair.classList.toggle('filled', !!chairStates[i]);
                }
            }
            const bagCount = chairStates.filter(Boolean).length;
            document.getElementById('bagCount').textContent = bagCount;
            document.getElementById('totalCount').textContent = totalChairs;
            document.getElementById('summary').style.display = 'block';
        }

        function updateConfigUI() {
            document.getElementById('cfgRows').value = rows;
            document.getElementById('cfgLayout').value = layout.join(',');
            const cpr = chairsPerRow();
            document.getElementById('configSummary').textContent =
                `${rows} rows · ${layout.join('-')} chairs per row · ${totalChairs} chairs total`;
        }

        function applyConfig() {
            const newRows = parseInt(document.getElementById('cfgRows').value);
            const rawLayout = document.getElementById('cfgLayout').value;
            const newLayout = rawLayout.split(',').map(s => parseInt(s.trim())).filter(n => n > 0);

            if (!newRows || newRows < 1 || newRows > 30) {
                alert('Rows must be between 1 and 30.');
                return;
            }
            if (newLayout.length === 0) {
                alert('Enter at least one chair group (e.g. 6,6,6).');
                return;
            }

            const newTotal = newRows * newLayout.reduce((a, b) => a + b, 0);
            if (!confirm(`Apply new layout? ${newRows} rows · ${newLayout.join('-')} chairs per row · ${newTotal} chairs total.\n\nThis will reset all current bag placements.`)) return;

            rows = newRows;
            layout = newLayout;
            totalChairs = newTotal;
            chairStates = new Array(totalChairs).fill(false);
            fillPriority = generateFillPriority(rows, layout);

            updateConfigUI();
            createSeatingLayout();
            saveToFirestore();
        }

        window.addEventListener('load', () => {
            // Initialize with defaults, then load from Firestore
            fillPriority = generateFillPriority(rows, layout);
            updateConfigUI();
            createSeatingLayout();
            setupScrollIndicators();

            db.collection('bag-tracker').doc('current').onSnapshot(snapshot => {
                if (!snapshot.exists) return;
                const data = snapshot.data();

                const newRows = data.rows || rows;
                const newLayout = data.layout || layout;
                const layoutChanged =
                    newRows !== rows ||
                    JSON.stringify(newLayout) !== JSON.stringify(layout);

                if (layoutChanged) {
                    rows = newRows;
                    layout = newLayout;
                    totalChairs = rows * layout.reduce((a, b) => a + b, 0);
                    fillPriority = generateFillPriority(rows, layout);
                    chairStates = data.chairStates || new Array(totalChairs).fill(false);
                    updateConfigUI();
                    createSeatingLayout();
                } else if (data.lastClientId !== myClientId) {
                    chairStates = data.chairStates || new Array(totalChairs).fill(false);
                    updateDisplay();
                }
            });
        });

        function setupScrollIndicators() {
            const seatingArea = document.getElementById('seatingArea');

            function updateScrollShadows() {
                const scrollLeft = seatingArea.scrollLeft;
                const maxScroll = seatingArea.scrollWidth - seatingArea.clientWidth;
                seatingArea.classList.toggle('show-left-shadow', scrollLeft > 10);
                seatingArea.classList.toggle('show-right-shadow', scrollLeft < maxScroll - 10);
            }

            seatingArea.addEventListener('scroll', updateScrollShadows);
            window.addEventListener('resize', updateScrollShadows);
            setTimeout(updateScrollShadows, 100);
        }
    </script>
</body>
</html>
